# =============================================================================
# CLOUD BUILD — ECO RODOVIAS (standalone)
# GitHub (main) → Build → Push → Deploy → Cloud Run
# =============================================================================
#
# SETUP ÚNICO (executar uma vez):
#   gcloud config set project SEU_PROJECT_ID
#   gcloud services enable cloudbuild.googleapis.com run.googleapis.com containerregistry.googleapis.com
#   gcloud projects add-iam-policy-binding SEU_PROJECT_ID \
#     --member="serviceAccount:$(gcloud projects describe SEU_PROJECT_ID --format='value(projectNumber)')@cloudbuild.gserviceaccount.com" \
#     --role="roles/run.admin"
#
# APÓS SETUP: cada push em main faz deploy automático.
# =============================================================================

substitutions:
  _SERVICE_NAME: eco-rodovias
  _REGION: us-central1
  _IMAGE: gcr.io/$PROJECT_ID/eco-rodovias

steps:

  # ── 1. Build da imagem ───────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--tag=${_IMAGE}:$COMMIT_SHA'
      - '--tag=${_IMAGE}:latest'
      - '--cache-from=${_IMAGE}:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # ── 2. Push para Container Registry ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE}'

  # ── 3. Deploy no Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--timeout=300'
      - '--port=8080'
      - '--concurrency=80'
      - '--set-env-vars=PYTHONUNBUFFERED=1'
      - '--quiet'

images:
  - '${_IMAGE}:$COMMIT_SHA'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  dynamic_substitutions: true

timeout: '1200s'
